<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Chest Animatic</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at top, #2a1e4f 0%, #151022 45%, #09070f 100%);
  color: #ffffff;
  text-align: center;
}
#scene {
  min-height: 100vh;
  padding: 28px 20px 40px;
  position: relative;
  overflow: hidden;
}
#scene::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,0.08), transparent 18%),
    radial-gradient(circle at 80% 10%, rgba(255,220,120,0.10), transparent 20%),
    radial-gradient(circle at 50% 0%, rgba(173,112,255,0.14), transparent 28%);
  pointer-events: none;
}
.stage {
  position: relative;
  z-index: 1;
  max-width: 1150px;
  margin: 0 auto;
}
h2 {
  margin: 0 0 18px;
  font-size: 34px;
  letter-spacing: 1px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
}
#debugBox {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 320px;
  text-align: left;
  background: rgba(8,10,18,0.82);
  border: 1px solid rgba(160,188,255,0.35);
  border-radius: 14px;
  padding: 10px 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  z-index: 4;
  font-family: Consolas, monospace;
  font-size: 13px;
  line-height: 1.45;
  color: #d6e6ff;
  white-space: pre-line;
}
#debugBox .debugTitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: #8fb8ff;
  margin-bottom: 6px;
}
.debugPreset {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(160,188,255,0.2);
}
.presetTitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.1px;
  color: #9cc4ff;
  margin-bottom: 6px;
}
.presetRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.presetRow label {
  width: 44px;
  color: #c9dbff;
  font-size: 12px;
}
.presetRow select {
  flex: 1;
  background: rgba(14,18,30,0.95);
  color: #e8f0ff;
  border: 1px solid rgba(155,185,255,0.4);
  border-radius: 7px;
  font-family: Consolas, monospace;
  font-size: 12px;
  padding: 5px 6px;
}
#setReelsBtn {
  margin-top: 8px;
  width: 100%;
  padding: 8px 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(180deg, #7fb6ff 0%, #4f7ed7 100%);
  color: #061836;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 0.7px;
  cursor: pointer;
}
#setReelsBtn:hover {
  filter: brightness(1.05);
}
#presetStatus {
  margin-top: 6px;
  min-height: 16px;
  color: #a9c8ff;
  font-size: 11px;
}
#presetStatus.error {
  color: #ff9e9e;
}
.monitorRow {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 26px;
  flex-wrap: wrap;
}
.monitor {
  width: 240px;
  min-height: 180px;
  background: linear-gradient(180deg, #2c324c 0%, #161a2d 100%);
  border: 3px solid #66739e;
  border-radius: 20px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.35), inset 0 0 0 3px rgba(255,255,255,0.05);
  margin: 10px 0;
  padding: 12px 12px 16px;
  position: relative;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.monitor::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -20px;
  width: 70px;
  height: 20px;
  transform: translateX(-50%);
  background: linear-gradient(180deg, #525d82 0%, #2c3149 100%);
  border-radius: 0 0 16px 16px;
  opacity: 0.95;
}
.monitorHost,
.monitorAudience {
  transform: translateY(28px);
}
.monitor.pulse {
  transform: translateY(24px) scale(1.03);
  box-shadow: 0 18px 46px rgba(0,0,0,0.42), 0 0 24px rgba(255,232,130,0.18), inset 0 0 0 3px rgba(255,255,255,0.05);
}
.screenFace {
  border-radius: 14px;
  height: 112px;
  margin-bottom: 10px;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12), inset 0 -14px 26px rgba(0,0,0,0.25);
  position: relative;
  overflow: hidden;
}
.screenFace::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0) 24%),
    repeating-linear-gradient(180deg, rgba(255,255,255,0.03) 0 2px, rgba(255,255,255,0) 2px 5px);
  pointer-events: none;
}
.hostFace {
  background: linear-gradient(180deg, #69dbff 0%, #22618a 55%, #11273f 100%);
}
.hostStageLights {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,245,160,0.65), transparent 25%),
    radial-gradient(circle at 82% 20%, rgba(255,210,140,0.6), transparent 26%);
}
.hostDesk {
  position: absolute;
  left: 20px;
  right: 20px;
  bottom: 14px;
  height: 22px;
  border-radius: 12px;
  background: linear-gradient(180deg, #2e384d 0%, #1a2232 100%);
  border: 1px solid rgba(255,255,255,0.2);
}
.hostAvatar {
  position: absolute;
  left: 50%;
  bottom: 24px;
  width: 72px;
  height: 76px;
  transform: translateX(-50%);
  animation: hostBob 2.2s ease-in-out infinite;
}
.hostHead {
  position: absolute;
  left: 50%;
  top: 0;
  width: 28px;
  height: 28px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 40% 28%, #ffdcb6 0%, #e3ac74 72%, #c0844d 100%);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.3);
}
.hostHair {
  position: absolute;
  left: 50%;
  top: -2px;
  width: 30px;
  height: 12px;
  transform: translateX(-50%);
  border-radius: 10px 10px 4px 4px;
  background: linear-gradient(180deg, #2f1f10 0%, #1a120b 100%);
}
.hostBody {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 44px;
  height: 46px;
  transform: translateX(-50%);
  border-radius: 13px 13px 6px 6px;
  background: linear-gradient(180deg, #f6d25a 0%, #c18f2a 100%);
  border: 2px solid rgba(0,0,0,0.18);
}
.hostTie {
  position: absolute;
  left: 50%;
  bottom: 10px;
  width: 8px;
  height: 19px;
  transform: translateX(-50%);
  border-radius: 3px;
  background: linear-gradient(180deg, #e44a40 0%, #9f1f17 100%);
}
.hostArm {
  position: absolute;
  top: 36px;
  width: 20px;
  height: 8px;
  border-radius: 6px;
  background: #e8bb8d;
  transform-origin: center right;
}
.hostArmLeft {
  left: 2px;
  transform: rotate(14deg);
}
.hostArmRight {
  right: 2px;
  transform-origin: center left;
  transform: rotate(-16deg);
  animation: hostWave 1.8s ease-in-out infinite;
}
.audienceFace {
  background: linear-gradient(180deg, #ffd38a 0%, #9d5a2d 55%, #5c2e18 100%);
}
.audienceCrowd {
  position: absolute;
  left: 10px;
  right: 10px;
  bottom: 10px;
  top: 14px;
}
.audienceLayer {
  position: absolute;
  left: 0;
  right: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.audienceBack {
  top: 2px;
  bottom: 26px;
  opacity: 0.72;
  transform: scale(0.9);
}
.audienceFront {
  top: 18px;
  bottom: 0;
}
.audienceMember {
  width: 14px;
  height: 56px;
  position: relative;
  animation: crowdIdle 1.2s ease-in-out infinite;
  animation-delay: var(--delay);
}
.audHead {
  position: absolute;
  left: 50%;
  top: 0;
  width: 14px;
  height: 14px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffe0bf 0%, #d8a16d 78%, #9d6c42 100%);
}
.audHair {
  position: absolute;
  left: 50%;
  top: -1px;
  width: 15px;
  height: 7px;
  transform: translateX(-50%);
  border-radius: 8px 8px 3px 3px;
  background: #2c1f17;
}
.hairB .audHair {
  height: 8px;
  border-radius: 10px 10px 2px 2px;
  background: #5a3821;
}
.hairC .audHair {
  width: 16px;
  border-radius: 50% 50% 2px 2px;
  background: #141217;
}
.audBody {
  position: absolute;
  left: 50%;
  top: 12px;
  width: 13px;
  height: 42px;
  transform: translateX(-50%);
  border-radius: 7px 7px 4px 4px;
  background: linear-gradient(180deg, #404f7e 0%, #273455 100%);
}
#audienceMonitor.mood-idle .audienceMember {
  animation-name: crowdIdle;
  animation-duration: 1.2s;
}
#audienceMonitor.mood-cheer .audienceMember {
  animation-name: crowdCheer;
  animation-duration: 0.62s;
}
#audienceMonitor.mood-boo .audienceMember {
  animation-name: crowdBoo;
  animation-duration: 0.9s;
}
#audienceMonitor.mood-shock .audienceMember {
  animation-name: crowdShock;
  animation-duration: 0.7s;
}
@keyframes hostBob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-2px); }
}
@keyframes hostWave {
  0%, 100% { transform: rotate(-16deg); }
  50% { transform: rotate(-38deg); }
}
@keyframes crowdIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes crowdCheer {
  0%, 100% { transform: translateY(0) scaleY(1); }
  50% { transform: translateY(-8px) scaleY(1.05); }
}
@keyframes crowdBoo {
  0%, 100% { transform: translateY(0); filter: saturate(0.9); }
  50% { transform: translateY(2px); filter: saturate(0.75); }
}
@keyframes crowdShock {
  0%, 100% { transform: translateY(0); }
  20% { transform: translateY(-6px); }
  40% { transform: translateY(0); }
  60% { transform: translateY(-5px); }
}
.label {
  font-size: 12px;
  color: #cfd8ff;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}
.dialog {
  margin-top: 8px;
  font-size: 18px;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff4c7;
  text-shadow: 0 2px 8px rgba(0,0,0,0.45);
}
.slotMonitor {
  width: 400px;
  min-height: 250px;
  padding-bottom: 18px;
  background: linear-gradient(180deg, #313a57 0%, #141a2b 100%);
}
#slot {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-top: 16px;
  padding: 14px;
  border-radius: 24px;
  border: 2px solid rgba(188, 208, 255, 0.3);
  background: linear-gradient(180deg, rgba(16,23,42,0.9) 0%, rgba(11,16,30,0.95) 100%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.06), inset 0 10px 24px rgba(140,180,255,0.08);
}
.bar {
  width: 110px;
  height: 126px;
  border: 4px solid #af9155;
  border-radius: 18px;
  background: linear-gradient(180deg, #fff4ca 0%, #d5bb74 100%);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.25), 0 8px 18px rgba(0,0,0,0.25);
  position: relative;
  overflow: hidden;
}
.bar::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 35%);
  pointer-events: none;
}
.bar.locked {
  transform: translateY(-4px);
  box-shadow: inset 0 0 0 4px rgba(255,255,255,0.25), 0 12px 24px rgba(0,0,0,0.3), 0 0 18px rgba(255,234,140,0.25);
}
.reelWindow {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
.reelScroller {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  transition: transform 0.11s linear;
}
.reelItem {
  height: 126px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.symbolArt {
  font-size: 44px;
  line-height: 1;
  font-weight: bold;
  filter: drop-shadow(0 2px 2px rgba(0,0,0,0.28));
}
.symbolName {
  font-size: 14px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: #503800;
}
#chestWrap {
  margin-top: 48px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  min-height: 300px;
  position: relative;
  overflow: visible;
}
#lootBurst,
#enemyBurst,
#fireworks,
#lootFloor,
#questScroll {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
#lootBurst {
  bottom: 170px;
  width: 520px;
  height: 130px;
}
#enemyBurst {
  bottom: 192px;
  font-size: 22px;
  letter-spacing: 2px;
  opacity: 0;
  color: #ff8d8d;
  font-weight: bold;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 6;
}
#fireworks {
  bottom: 205px;
  width: 580px;
  height: 180px;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 5;
}
#lootFloor {
  bottom: 0;
  width: 700px;
  height: 240px;
  z-index: 7;
}
#questScroll {
  bottom: 226px;
  opacity: 0;
  transform: translateX(-50%) translateY(8px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  z-index: 8;
}
.showQuestScroll {
  opacity: 1 !important;
  transform: translateX(-50%) translateY(0) !important;
}
.questPaper {
  width: 210px;
  min-height: 74px;
  border-radius: 12px;
  border: 2px solid #8c6a2a;
  background:
    radial-gradient(circle at 50% 14%, rgba(255,255,255,0.5), rgba(255,255,255,0) 50%),
    linear-gradient(180deg, #f8e9b5 0%, #dfc27f 100%);
  box-shadow: 0 10px 18px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.45);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #5c3f09;
  font-size: 20px;
  letter-spacing: 1px;
  font-weight: bold;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: center;
  line-height: 1.15;
  position: relative;
}
.questTitle {
  font-size: 16px;
  letter-spacing: 1.1px;
}
.questDetail {
  margin-top: 4px;
  font-size: 14px;
  letter-spacing: 0.6px;
}
.questPaper::before,
.questPaper::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 18px;
  height: 46px;
  margin-top: -23px;
  border-radius: 10px;
  background: linear-gradient(180deg, #e8cc8a 0%, #ba9049 100%);
  box-shadow: inset 0 0 0 1px rgba(84,53,13,0.25);
}
.questPaper::before { left: -10px; }
.questPaper::after { right: -10px; }
.showBurst {
  opacity: 1 !important;
  transform: translateX(-50%) translateY(-12px) !important;
}
.showFireworks {
  opacity: 1 !important;
}
.fireworkBurst {
  position: absolute;
  width: 0;
  height: 0;
}
.fireworkCore {
  position: absolute;
  left: 0;
  top: 0;
  width: 8px;
  height: 8px;
  margin-left: -4px;
  margin-top: -4px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff9d1 0%, #ffd56f 70%, rgba(255,213,111,0.2) 100%);
  animation: fireworkCorePop 700ms ease-out forwards;
}
.spark {
  position: absolute;
  left: 0;
  top: 0;
  width: 8px;
  height: 8px;
  margin-left: -4px;
  margin-top: -4px;
  border-radius: 50%;
  background: var(--spark-color, #ffd66c);
  box-shadow: 0 0 14px var(--spark-color, #ffd66c);
  animation: sparkBurst 1250ms cubic-bezier(0.08, 0.7, 0.22, 0.98) forwards;
  animation-delay: var(--spark-delay, 0ms);
}
@keyframes fireworkCorePop {
  0% { transform: scale(0.2); opacity: 0; }
  35% { transform: scale(1.4); opacity: 1; }
  100% { transform: scale(0.2); opacity: 0; }
}
@keyframes sparkBurst {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translate(var(--dx), var(--dy)) scale(0.2);
    opacity: 0;
  }
}
.lootToken {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(calc(-50% + 0px)) translateY(-132px) rotate(0deg);
  animation: lootArcSettle 1.08s cubic-bezier(0.18, 0.82, 0.2, 1) forwards;
  opacity: 0;
}
.lootSprite {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,0.42);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  line-height: 1;
  box-shadow: 0 8px 14px rgba(0,0,0,0.35);
}
.lootCoin {
  background: linear-gradient(180deg, #ffe58f 0%, #cb8f1c 100%);
  color: #6a4305;
}
.lootWeapon {
  width: 120px;
  height: 70px;
  border: none;
  background: none;
  box-shadow: none;
  color: #1d2b40;
}
.lootItem {
  background: linear-gradient(180deg, #d9ffe0 0%, #67b17a 100%);
  color: #163b21;
}
.lootJackpot {
  background: linear-gradient(180deg, #ffddff 0%, #b57adf 100%);
  color: #3f1f57;
}
.lootAmmo {
  background: linear-gradient(180deg, #fff0b8 0%, #c7a159 100%);
  color: #5a3a0c;
}
.ammoClip {
  position: relative;
  width: 18px;
  height: 22px;
  border-radius: 4px;
  background: linear-gradient(180deg, #6a7688 0%, #3f4a5a 100%);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22);
}
.ammoClip::before {
  content: "";
  position: absolute;
  left: 2px;
  right: 2px;
  top: -5px;
  height: 5px;
  border-radius: 2px 2px 0 0;
  background: linear-gradient(180deg, #c59a3f 0%, #8f6b2a 100%);
}
.ammoClip::after {
  content: "";
  position: absolute;
  left: 4px;
  right: 4px;
  top: 5px;
  height: 10px;
  border-radius: 2px;
  background: repeating-linear-gradient(180deg, rgba(255,255,255,0.35) 0 2px, rgba(255,255,255,0) 2px 4px);
}
.pickupCore {
  position: relative;
  width: 20px;
  height: 20px;
  border-radius: 6px;
  background: linear-gradient(180deg, #f2ffd9 0%, #80cf8f 100%);
  border: 2px solid rgba(255,255,255,0.72);
  box-shadow: inset 0 0 0 1px rgba(20,60,30,0.25);
}
.pickupCore::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 12px;
  height: 2px;
  transform: translate(-50%, -50%);
  background: #2a6b39;
}
.pickupCore::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 2px;
  height: 12px;
  transform: translate(-50%, -50%);
  background: #2a6b39;
}
.gun {
  position: relative;
  width: 24px;
  height: 14px;
  transform: scale(5);
  transform-origin: center;
}
.gunQ1 {
  transform: scale(4.5) rotate(-4deg);
}
.gunQ2 {
  transform: scale(5.1) rotate(-2deg);
}
.gunQ3 {
  transform: scale(5.7) rotate(-1deg);
}
.gunBody,
.gunBarrel,
.gunGrip,
.gunStock,
.gunSight,
.gunMuzzle,
.gunDrum,
.gunUnderbarrel {
  position: absolute;
  background: #2c394e;
}
.gunBody {
  left: 5px;
  top: 5px;
  width: 11px;
  height: 5px;
  border-radius: 3px;
}
.gunBarrel {
  left: 15px;
  top: 6px;
  width: 8px;
  height: 3px;
  border-radius: 0 2px 2px 0;
}
.gunGrip {
  left: 8px;
  top: 9px;
  width: 4px;
  height: 6px;
  border-radius: 0 0 2px 2px;
  transform: skew(-10deg);
}
.gunStock {
  left: 1px;
  top: 6px;
  width: 5px;
  height: 4px;
  border-radius: 2px 0 0 2px;
}
.lootWeapon.q1 .gunBody,
.lootWeapon.q1 .gunBarrel,
.lootWeapon.q1 .gunGrip,
.lootWeapon.q1 .gunStock {
  background: #2f3c4f;
}
.lootWeapon.q1 .gunStock {
  left: 3px;
  top: 7px;
  width: 2px;
  height: 3px;
  border-radius: 1px;
}
.lootWeapon.q1 .gunBody {
  left: 6px;
  top: 6px;
  width: 8px;

<script>

  var enemyBurst = document.getElementById('enemyBurst');

  ];

  var spinning = false;

  var crowdMoodTimer = null;

  var lootPileState = { leftCount: 0, rightCount: 0, itemLeftCount: 0, itemRightCount: 0 };

  function rand(arr) {

  function wait(ms) {
    return new Promise(function (resolve) {
      setTimeout(resolve, ms);

  function renderReelMarkup(symbol) {
    return '<div class="reelItem"><div class="symbolArt">' + symbol.icon + '</div><div class="symbolName">' + symbol.label + '</div></div>';
  }

  function renderSymbol(el, symbol) {
    el.innerHTML = '<div class="reelWindow"><div class="reelScroller">' + renderReelMarkup(symbol) + '</div></div>';
    el.dataset.key = symbol.key;
  }

  function pulseMonitor(el) {
    el.classList.add('pulse');
    setTimeout(function () {
      el.classList.remove('pulse');
    }, 220);
  }

  function pulseCrowd() {
    pulseMonitor(hostMonitor);
    pulseMonitor(audienceMonitor);
  }

  function buildAudienceLayer(layerEl, count, depthClass) {
    var hairVariants = ['hairA', 'hairB', 'hairC'];
    var tones = ['#344572', '#4c3c79', '#3f5a55', '#5a3f4b', '#3f4f6f'];
    var idx;
    layerEl.innerHTML = '';
    for (idx = 0; idx < count; idx += 1) {
      var member = document.createElement('div');
      var head = document.createElement('div');
      var hair = document.createElement('div');
      var body = document.createElement('div');
      member.className = 'audienceMember ' + hairVariants[idx % hairVariants.length] + ' ' + depthClass;
      member.style.setProperty('--delay', (idx * 0.07) + 's');
      head.className = 'audHead';
      hair.className = 'audHair';
      body.className = 'audBody';
      body.style.background = 'linear-gradient(180deg, ' + tones[idx % tones.length] + ' 0%, #202538 100%)';
      member.appendChild(head);
      member.appendChild(hair);
      member.appendChild(body);
      layerEl.appendChild(member);
    }
  }

  function buildAudience() {
    buildAudienceLayer(audienceBack, 12, 'depthBack');
    buildAudienceLayer(audienceFront, 16, 'depthFront');
    audienceMonitor.classList.add('mood-idle');
  }

  function setCrowdMood(mood, holdMs) {
    audienceMonitor.classList.remove('mood-idle', 'mood-cheer', 'mood-boo', 'mood-shock');
    audienceMonitor.classList.add('mood-' + mood);
    if (crowdMoodTimer) {
      clearTimeout(crowdMoodTimer);
      crowdMoodTimer = null;
    }
    if (holdMs && mood !== 'idle') {
      crowdMoodTimer = setTimeout(function () {
        setCrowdMood('idle');
      }, holdMs);
    }
  }

  function clearFireworkTimers() {
    var idx;
    for (idx = 0; idx < fireworkWaveTimers.length; idx += 1) {
      clearTimeout(fireworkWaveTimers[idx]);
    }
    fireworkWaveTimers = [];
  }

  function clearLootTimers() {
    var idx;
    for (idx = 0; idx < lootFountainTimers.length; idx += 1) {
      clearInterval(lootFountainTimers[idx]);
      clearTimeout(lootFountainTimers[idx]);
    }
    lootFountainTimers = [];
  }

  function resetBars() {
    var idx;
    for (idx = 0; idx < bars.length; idx += 1) {
      bars[idx].classList.remove('locked');
      renderSymbol(bars[idx], symbolByKey.empty);
    }
  }

  function clearCelebration() {

    lootBurst.innerHTML = '';

    lootFloor.innerHTML = '';

    questDetailText.innerText = '';
    lootPileState.leftCount = 0;

  }

  function setIdleText() {
    hostText.innerText = rand(hostIdle);
    audText.innerText = rand(audIdle);
    setCrowdMood('idle');
  }

  function startIdleLoop() {
    stopIdleLoop();
    setIdleText();
    idleTicker = setInterval(function () {
      if (spinning) {
        return;
      }
      setIdleText();
      pulseCrowd();
    }, 4000);
  }

  function stopIdleLoop() {
    if (idleTicker) {
      clearInterval(idleTicker);
      idleTicker = null;
    }
  }

  function openChest() {
    chest.classList.add('opening');
    setTimeout(function () {
      chest.classList.remove('opening');
      chest.classList.add('open');
    }, 340);
  }

  function closeChest() {
    chest.classList.remove('opening');
    chest.classList.remove('open');
  }

  function buildGunSprite(quality) {
    var gun = document.createElement('div');
    var body = document.createElement('div');
    var barrel = document.createElement('div');
    var grip = document.createElement('div');
    var stock = document.createElement('div');
    gun.className = 'gun gunQ' + quality;
    body.className = 'gunBody';
    barrel.className = 'gunBarrel';
    grip.className = 'gunGrip';
    stock.className = 'gunStock';
    gun.appendChild(body);
    gun.appendChild(barrel);
    gun.appendChild(grip);
    gun.appendChild(stock);
    if (quality >= 2) {
      var sight = document.createElement('div');
      sight.className = 'gunSight';
      gun.appendChild(sight);
      if (quality === 2) {
        var underbarrel = document.createElement('div');
        underbarrel.className = 'gunUnderbarrel';
        gun.appendChild(underbarrel);
      }
    }
    if (quality >= 3) {
      var muzzle = document.createElement('div');
      var drum = document.createElement('div');
      muzzle.className = 'gunMuzzle';
      drum.className = 'gunDrum';
      gun.appendChild(muzzle);
      gun.appendChild(drum);
    }
    return gun;
  }

  function createLootSprite(kind, quality) {
    var sprite = document.createElement('div');
    sprite.className = 'lootSprite';
    if (kind === 'coin') {
      sprite.classList.add('lootCoin');
      sprite.textContent = '\u25C9';
      return sprite;
    }
    if (kind === 'item') {
      var pickup = document.createElement('div');
      sprite.classList.add('lootItem');
      pickup.className = 'pickupCore';
      sprite.appendChild(pickup);
      return sprite;
    }
    if (kind === 'ammo') {
      var ammoClip = document.createElement('div');
      sprite.classList.add('lootAmmo');
      ammoClip.className = 'ammoClip';
      sprite.appendChild(ammoClip);
      return sprite;
    }
    if (kind === 'weapon') {
      var qualityValue = Math.max(1, Math.min(3, quality || 1));
      sprite.classList.add('lootWeapon', 'q' + qualityValue);
      sprite.appendChild(buildGunSprite(qualityValue));
      return sprite;
    }
    sprite.classList.add('lootJackpot');
    sprite.textContent = '\u2726';
    return sprite;
  }

  function appendLootToken(kind, quality, tokenIndex) {
    var leftSlots = [-294, -260, -226, -192, -158, -124];
    var rightSlots = [124, 158, 192, 226, 260, 294];
    var itemLeftSlots = [-308, -278, -248, -218, -188, -158, -128, -98];
    var itemRightSlots = [98, 128, 158, 188, 218, 248, 278, 308];
    var el = document.createElement('div');
    var sprite = createLootSprite(kind, quality);
    var targetSideLeft = tokenIndex % 2 === 0;
    var isItem = kind === 'item';
    var slotList = targetSideLeft
      ? (isItem ? itemLeftSlots : leftSlots)
      : (isItem ? itemRightSlots : rightSlots);
    var sideCount = targetSideLeft
      ? (isItem ? lootPileState.itemLeftCount : lootPileState.leftCount)
      : (isItem ? lootPileState.itemRightCount : lootPileState.rightCount);
      var stackLevel = Math.floor(sideCount / slotList.length);
      var slot = slotList[sideCount % slotList.length];
      var xJitter = isItem ? ((Math.random() * 6) - 3) : ((Math.random() * 10) - 5);
      var targetX = slot + xJitter;
      var midX = targetX * (0.42 + Math.random() * 0.14);
      var peakY = -188 - Math.random() * 32;
      var settleY = isItem
        ? -Math.min(44, stackLevel * 12)
        : -Math.min(20, stackLevel * 8);
    if (targetSideLeft) {
      if (isItem) {
        lootPileState.itemLeftCount += 1;
      } else {
        lootPileState.leftCount += 1;
      }
    } else {
      if (isItem) {
        lootPileState.itemRightCount += 1;
      } else {
        lootPileState.rightCount += 1;
      }
    }
    el.className = 'lootToken';
    el.appendChild(sprite);
    el.style.setProperty('--mx', midX.toFixed(1) + 'px');
    el.style.setProperty('--tx', targetX.toFixed(1) + 'px');
    el.style.setProperty('--peak', peakY.toFixed(1) + 'px');
    el.style.setProperty('--ty', settleY.toFixed(1) + 'px');
    el.style.setProperty('--r0', (Math.random() * 130 - 65).toFixed(1) + 'deg');
    el.style.setProperty('--r1', (Math.random() * 70 - 35).toFixed(1) + 'deg');
    el.style.setProperty('--r2', (Math.random() * 16 - 8).toFixed(1) + 'deg');
    lootFloor.appendChild(el);
  }

  function spawnLootFountain(options) {
    var total = Math.max(0, options.total || 0);
    var emitted = 0;
    var perTick = Math.max(1, options.perTick || 1);
    var rateMs = Math.max(20, options.rateMs || 70);
    var startDelay = Math.max(0, options.startDelay || 0);
    if (total === 0) {
      return;
    }
    if (options.reset) {
      clearLootTimers();
      lootFloor.innerHTML = '';
      lootPileState.leftCount = 0;
      lootPileState.rightCount = 0;
    }
    function emitBatch() {
      var step;
      for (step = 0; step < perTick && emitted < total; step += 1) {
        appendLootToken(options.kind, options.quality, emitted);
        emitted += 1;
      }
      if (emitted >= total) {
        clearInterval(timerId);
      }
    }
    function startFountain() {
      emitBatch();
      timerId = setInterval(emitBatch, rateMs);
      lootFountainTimers.push(timerId);
    }
    var timerId = null;
    if (startDelay > 0) {
      var kickoffId = setTimeout(startFountain, startDelay);
      lootFountainTimers.push(kickoffId);
      return;
    }
    startFountain();
  }

  function getCoinDropTotal(coinReels) {
    if (coinReels >= 3) {
      return 30;
    }
    if (coinReels === 2) {
      return 15;
    }
    if (coinReels === 1) {
      return 5;
    }
    return 0;
  }

  function getJackpotBoostedCount(baseCount, jackpotCount) {
    if (baseCount <= 0) {
      return 0;
    }
    return Math.min(3, baseCount + jackpotCount);
  }

  function getWeaponRewardPlan(weaponReels) {
    if (weaponReels >= 3) {
      return {
        weapons: [
          { quality: 3, total: 1 },
          { quality: 2, total: 2 }
        ],
        ammo: 14
      };
    }
    if (weaponReels === 2) {
      return {
        weapons: [{ quality: 2, total: 1 }],
        ammo: 8
      };
    }
    return {
      weapons: [{ quality: 1, total: 1 }],
      ammo: 4
    };
  }

    enemyBurst.classList.add('showBurst');

  function showQuestFound(detail) {

  function launchFireworkWave(spots, waveIndex) {
    var colors = ['#ffe27a', '#ff9f6b', '#8be3ff', '#ffd4f2', '#fff6c1'];
    var idx;
    var j;
    for (idx = 0; idx < spots.length; idx += 1) {
      var burst = document.createElement('div');
      var core = document.createElement('div');
      var jitterX = (Math.random() * 16) - 8;
      var jitterY = (Math.random() * 14) - 7;
      burst.className = 'fireworkBurst';
      burst.style.left = (spots[idx].x + jitterX) + 'px';
      burst.style.top = (spots[idx].y + jitterY) + 'px';

      core.className = 'fireworkCore';
      core.style.animationDelay = (waveIndex * 60 + idx * 42) + 'ms';
      burst.appendChild(core);

      for (j = 0; j < spots[idx].sparks; j += 1) {
        var spark = document.createElement('div');
        var angle = (Math.PI * 2 * j) / spots[idx].sparks;
        var spread = spots[idx].radius * (0.72 + Math.random() * 0.48);
        var dx = Math.cos(angle) * spread;
        var dy = Math.sin(angle) * spread;
        spark.className = 'spark';
        spark.style.setProperty('--dx', dx.toFixed(2) + 'px');
        spark.style.setProperty('--dy', dy.toFixed(2) + 'px');
        spark.style.setProperty('--spark-color', colors[(j + idx) % colors.length]);
        spark.style.setProperty('--spark-delay', (idx * 35 + waveIndex * 75 + Math.random() * 140).toFixed(0) + 'ms');
        burst.appendChild(spark);
      }
      fireworks.appendChild(burst);
    }
  }

  function updateDebugText() {
    var lines = [];
    var idx;
    for (idx = 0; idx < predeterminedRewards.length; idx += 1) {
      lines.push('reel_' + (idx + 1) + ': ' + predeterminedRewards[idx]);

  function setPresetStatus(message, isError) {
    presetStatus.innerText = message || '';
    presetStatus.classList.toggle('error', !!isError);

  function syncReelSelectorsFromPredetermined() {
    var idx;
    for (idx = 0; idx < reelSelects.length; idx += 1) {
      if (predeterminedRewards[idx]) {
        reelSelects[idx].value = predeterminedRewards[idx];
      }
    }
  }

  function buildReelPresetOptions() {
    var validSymbols = symbols.filter(function (s) { return s.key !== 'empty'; });
    var idx;
    var j;
    for (idx = 0; idx < reelSelects.length; idx += 1) {
      reelSelects[idx].innerHTML = '';
      for (j = 0; j < validSymbols.length; j += 1) {
        var option = document.createElement('option');

      }

  function describeCount(typeKey, count) {
    if (!rewardMeaning[typeKey] || !rewardMeaning[typeKey][count]) {
      return String(count) + 'x ' + typeKey;
    }
    return rewardMeaning[typeKey][count];
  }

  function getCounts(results) {
    var counts = {};
    var idx;
    for (idx = 0; idx < results.length; idx += 1) {
      counts[results[idx]] = (counts[results[idx]] || 0) + 1;
    }
    return counts;
  }

  function isValidRewardSet(results) {
    var counts = getCounts(results);
    var keys = Object.keys(counts);
    var challengeCount = counts.challenge || 0;
    var nonChallengeKeys = [];
    var idx;
    if (results.length !== 3) {
      return false;
    }
    for (idx = 0; idx < results.length; idx += 1) {
      if (!symbolByKey[results[idx]] || results[idx] === 'empty') {
        return false;
      }
    }
    if (challengeCount === 0) {
      return true;
    }
    if (challengeCount > 3) {
      return false;
    }
    for (idx = 0; idx < keys.length; idx += 1) {
      if (keys[idx] !== 'challenge') {
        nonChallengeKeys.push(keys[idx]);
      }
    }
    if (nonChallengeKeys.length > 1) {
      return false;
    }
    return true;
  }

  function generateRewards() {
    var challengeChance = Math.random() < 0.22;
    var challengeCount;
    var baseType;
    var idx;

    predeterminedRewards = [];
    if (challengeChance) {
      challengeCount = 1 + Math.floor(Math.random() * 3);
      baseType = rand(rewardPool).key;
      for (idx = 0; idx < challengeCount; idx += 1) {
        predeterminedRewards.push('challenge');
      }
      while (predeterminedRewards.length < 3) {
        predeterminedRewards.push(baseType);
      }
    } else {
      for (idx = 0; idx < 3; idx += 1) {
        predeterminedRewards.push(rand(rewardPool).key);
      }
    }
    updateDebugText();
  }

  function animateReelToResult(bar, targetKey, durationMs) {
    return new Promise(function (resolve) {
      var totalDuration = durationMs || 1200;
      var targetSymbol = symbolByKey[targetKey];
      var sequence = [];
      var totalItems = 14;
      var reelPool = [];
      var idx;
      var stepMs = 90;
      var index = 0;
      var scroller;
      var interval;

      for (idx = 0; idx < rewardPool.length; idx += 1) {
        reelPool.push(rewardPool[idx]);
      }
      if (targetKey === 'challenge') {
        reelPool.push(symbolByKey.challenge);
      }

      sequence.push(targetSymbol);
      for (idx = 0; idx < totalItems - 1; idx += 1) {
        sequence.push(rand(reelPool));
      }

      bar.classList.remove('locked');
      bar.innerHTML = '<div class="reelWindow"><div class="reelScroller">' + sequence.map(renderReelMarkup).join('') + '</div></div>';
      scroller = bar.querySelector('.reelScroller');
      index = sequence.length - 1;
      scroller.style.transform = 'translateY(-' + (index * 126) + 'px)';

      interval = setInterval(function () {
        index -= 1;
        scroller.style.transform = 'translateY(-' + (index * 126) + 'px)';
        if (index <= 0) {
          clearInterval(interval);
          setTimeout(function () {
            renderSymbol(bar, targetSymbol);
            bar.classList.add('locked');
            pulseCrowd();
            setCrowdMood('shock', 700);
            hostText.innerText = hostReact[targetKey];
            audText.innerText = audReact[targetKey];
            resolve(targetKey);
          }, Math.max(80, totalDuration - (stepMs * sequence.length)));
        }
      }, stepMs);
    });
  }

  async function startSpin() {
    var idx;
    spinning = true;
    stopIdleLoop();
    clearCelebration();
    closeChest();
    openBtn.style.display = 'none';

    for (idx = 0; idx < 3; idx += 1) {
      await animateReelToResult(bars[idx], predeterminedRewards[idx], 1100 + (idx * 180));
      await wait(180);
    }

    openChest();
    await wait(260);
    resolveOutcome(predeterminedRewards);
    spinning = false;
    restartBtn.style.display = 'inline-block';
  }

  function resolveOutcome(results) {
    var counts = getCounts(results);
    var challengeCount = counts.challenge || 0;
    var nonChallengeTypes;
    var baseType;
    var baseCount;
    var baseText;
    var jackpotCount;
    var skullCount;
    var coinCount;
    var weaponCount;
    var itemCount;
    var maxMatch;
    var lootScheduled;
    var lootStartDelay;
    var boostedCoinCount;
    var boostedItemCount;
    var boostedWeaponCount;
    var key;

    setCrowdMood('shock', 900);

    if (challengeCount > 0) {
      var challengeText = describeCount('challenge', challengeCount);
      nonChallengeTypes = [];
      for (key in counts) {
        if (Object.prototype.hasOwnProperty.call(counts, key) && key !== 'challenge') {
          nonChallengeTypes.push(key);
        }
      }

      if (nonChallengeTypes.length === 0) {
        showQuestFound(challengeText);
        effects.innerText = 'Challenge Activated!';
        hostText.innerText = 'A ' + challengeText + ' appears!';
        audText.innerText = challengeCount === 3 ? 'OOOOHHH!!' : 'Ooooh!!';
        showFireworks(challengeCount >= 2);
        return;
      }

      baseType = nonChallengeTypes[0];
      baseCount = counts[baseType];
      baseText = describeCount(baseType, baseCount);
      effects.innerText = challengeText.charAt(0).toUpperCase() + challengeText.slice(1) + ' + ' + baseText;
      hostText.innerText = 'A ' + challengeText + ' with ' + baseText + '!';
      audText.innerText = baseType === 'skull' ? 'Ooooh...' : 'Ooooh!';

      if (baseType === 'skull') {
        showQuestFound(baseText);
        effects.innerText = 'Quest found: ' + challengeText + ' to defeat ' + baseText + '.';
        hostText.innerText = 'Quest found! Defeat enemies: ' + baseText + '.';
      }
      if (baseType === 'coin') {
        showQuestFound(baseText);
        effects.innerText = 'Quest found: ' + challengeText + ' with cash reward (' + baseText + ').';
        hostText.innerText = 'Quest found! Complete it for a cash reward!';
        spawnLootFountain({ kind: 'coin', total: getCoinDropTotal(baseCount), perTick: 2, rateMs: 55, reset: true });
        setCrowdMood('cheer', 1700);
      }
      if (baseType === 'weapon') {
        showQuestFound(baseText);
        effects.innerText = 'Quest found: ' + challengeText + ' about shooting (reward: ' + baseText + ').';
        hostText.innerText = 'Quest found! Weapon objective and weapon reward!';
        var challengeWeaponPlan = getWeaponRewardPlan(baseCount);
        spawnLootFountain({ kind: 'weapon', quality: challengeWeaponPlan.weapons[0].quality, total: challengeWeaponPlan.weapons[0].total, perTick: 1, rateMs: 95, reset: true });
        if (challengeWeaponPlan.weapons.length > 1) {
          spawnLootFountain({ kind: 'weapon', quality: challengeWeaponPlan.weapons[1].quality, total: challengeWeaponPlan.weapons[1].total, perTick: 1, rateMs: 95, startDelay: 220, reset: false });
        }
        spawnLootFountain({ kind: 'ammo', total: challengeWeaponPlan.ammo, perTick: 2, rateMs: 55, startDelay: 420, reset: false });
        setCrowdMood('cheer', 1700);
      }
      if (baseType === 'item') {
        showQuestFound(baseText);
        effects.innerText = 'Quest found: ' + challengeText + ' about using items (reward: ' + baseText + ').';
        hostText.innerText = 'Quest found! Item-based objective and item reward!';
        spawnLootFountain({ kind: 'item', total: baseCount, perTick: 1, rateMs: 95, reset: true });
        setCrowdMood('cheer', 1700);
      }
      if (baseType === 'jackpot') {
        showQuestFound(describeCount('jackpot', baseCount));
        effects.innerText = challengeText.charAt(0).toUpperCase() + challengeText.slice(1) + ' + ' + describeCount('jackpot', baseCount);
        showFireworks(baseCount >= 2 || challengeCount >= 2);
      }
      if (challengeCount >= 2 || baseCount === 3) {
        showFireworks(true);
      }
      return;
    }

    jackpotCount = counts.jackpot || 0;
    skullCount = counts.skull || 0;
    coinCount = counts.coin || 0;
    weaponCount = counts.weapon || 0;
    itemCount = counts.item || 0;
    maxMatch = 0;
    for (key in counts) {
      if (Object.prototype.hasOwnProperty.call(counts, key) && counts[key] > maxMatch) {
        maxMatch = counts[key];
      }
    }

    if (jackpotCount === 3) {
      effects.innerText = 'ULTIMATE JACKPOT QUEST!';
      hostText.innerText = 'INCREDIBLE! Triple jackpot overload!';
      audText.innerText = 'OOOOOOHHHHHH!!!';
      showQuestFound('Ultimate jackpot bounty');
      showFireworks(true);
      spawnLootFountain({ kind: 'coin', total: 80, perTick: 4, rateMs: 40, reset: true });
      spawnLootFountain({ kind: 'ammo', total: 36, perTick: 3, rateMs: 50, startDelay: 220, reset: false });
      spawnLootFountain({ kind: 'weapon', quality: 3, total: 2, perTick: 1, rateMs: 95, startDelay: 420, reset: false });
      spawnLootFountain({ kind: 'weapon', quality: 2, total: 4, perTick: 1, rateMs: 95, startDelay: 620, reset: false });
      return;
    }

    lootScheduled = false;
    lootStartDelay = 0;
    boostedCoinCount = getJackpotBoostedCount(coinCount, jackpotCount);
    boostedItemCount = getJackpotBoostedCount(itemCount, jackpotCount);
    boostedWeaponCount = getJackpotBoostedCount(weaponCount, jackpotCount);
    if (coinCount > 0) {
      spawnLootFountain({
        kind: 'coin',
        total: getCoinDropTotal(boostedCoinCount) + (jackpotCount * 10),
        perTick: 2,
        rateMs: 45,
        reset: true
      });
      lootScheduled = true;
      lootStartDelay = 240;
    }
    if (itemCount > 0) {
      spawnLootFountain({
        kind: 'item',
        total: boostedItemCount + jackpotCount,
        perTick: 1,
        rateMs: 95,
        startDelay: lootStartDelay,
        reset: !lootScheduled
      });
      lootScheduled = true;
      lootStartDelay += 220;
    }
    if (weaponCount > 0) {
      var weaponPlan = getWeaponRewardPlan(boostedWeaponCount);
      spawnLootFountain({
        kind: 'weapon',
        quality: weaponPlan.weapons[0].quality,
        total: weaponPlan.weapons[0].total,
        perTick: 1,
        rateMs: 105,
        startDelay: lootStartDelay,
        reset: !lootScheduled
      });
      if (weaponPlan.weapons.length > 1) {
        spawnLootFountain({
          kind: 'weapon',
          quality: weaponPlan.weapons[1].quality,
          total: weaponPlan.weapons[1].total,
          perTick: 1,
          rateMs: 105,
          startDelay: lootStartDelay + 220,
          reset: false
        });
      }
      spawnLootFountain({
        kind: 'ammo',
        total: weaponPlan.ammo + (jackpotCount * 4),
        perTick: 2,
        rateMs: 55,
        startDelay: lootStartDelay + 420,
        reset: false
      });
      lootScheduled = true;
    }

    if (skullCount > 0) {
      effects.innerText = '\u2620 The bad guys are coming! \u2620';
      showEnemies('\u2620 ENEMIES SPAWNING NEARBY: ' + describeCount('skull', skullCount).toUpperCase() + ' \u2620');
    }

    if (maxMatch === 3) {
      hostText.innerText = 'Three of a kind! What a pull!';
      audText.innerText = 'WOOOOOO!!';
      showFireworks(true);
      if (!effects.innerText) {
        effects.innerText = 'Amazing result!';
      }
      return;
    }

    if (jackpotCount === 2) {
      hostText.innerText = 'Double jackpot! Everything gets juicier!';
      audText.innerText = 'OHHHHHH!';
      showFireworks(true);
      if (!effects.innerText) {
        effects.innerText = 'Powered-up reward!';
      }
      return;
    }

    if (jackpotCount === 1) {
      hostText.innerText = 'A little jackpot spice! Not bad at all!';
      audText.innerText = 'Ooooh!';
      showFireworks(false);
      if (!effects.innerText) {
        effects.innerText = 'Boosted reward!';
      }
      return;
    }

    if (skullCount >= 2) {
      hostText.innerText = 'That chest is full of trouble!';
      audText.innerText = 'Boooo!';
      setCrowdMood('boo', 1800);
      return;
    }

    if (coinCount >= 2) {
      hostText.innerText = 'Coins! A tidy little payout!';
      audText.innerText = 'Ooooh!';
      setCrowdMood('cheer', 1500);
      return;
    }

    if (itemCount >= 2) {
      hostText.innerText = 'A nice bundle of items!';
      audText.innerText = 'Aaah!';
      setCrowdMood('cheer', 1500);
      return;
    }

    if (weaponCount >= 2) {
      hostText.innerText = 'Now that is a respectable weapon drop!';
      audText.innerText = 'Oooh!';
      setCrowdMood('cheer', 1500);
      return;
    }

    hostText.innerText = 'Well, that is the luck of the draw!';
    audText.innerText = 'Oooh...';
    setCrowdMood('idle');
    if (!effects.innerText) {
      effects.innerText = 'A modest reward.';
    }
  }

  function runSelfTests() {
    var failures = [];
    var debugValue;
    var before;
    var after;
    var j;

    if (describeCount('challenge', 1) !== 'easy challenge') { failures.push('Challenge count 1 meaning is wrong.'); }
    if (describeCount('challenge', 2) !== 'medium challenge') { failures.push('Challenge count 2 meaning is wrong.'); }
    if (describeCount('challenge', 3) !== 'hard challenge') { failures.push('Challenge count 3 meaning is wrong.'); }
    if (describeCount('skull', 3) !== 'boss enemy') { failures.push('Skull count 3 meaning is wrong.'); }
    if (describeCount('coin', 3) !== 'loads of cash') { failures.push('Coin count 3 meaning is wrong.'); }
    if (describeCount('jackpot', 2) !== 'upgrade a 1 or 2 to a 3') { failures.push('Jackpot count 2 meaning is wrong.'); }
    if (describeCount('weapon', 1) !== 'a boring weapon') { failures.push('Weapon count 1 meaning is wrong.'); }

    clearCelebration();
    predeterminedRewards = ['challenge', 'skull', 'skull'];
    if (!isValidRewardSet(predeterminedRewards)) { failures.push('challenge, skull, skull should be valid.'); }
    updateDebugText();
    resolveOutcome(predeterminedRewards);
    if (effects.innerText.toLowerCase().indexOf('easy challenge') === -1) {
      failures.push('Mixed challenge outcome should mention challenge difficulty.');
    }
    if (effects.innerText.toLowerCase().indexOf('medium enemies') === -1) {
      failures.push('Mixed challenge outcome should mention base reward strength.');
    }

    clearCelebration();
    predeterminedRewards = ['challenge', 'challenge', 'weapon'];
    if (!isValidRewardSet(predeterminedRewards)) { failures.push('challenge, challenge, weapon should be valid.'); }
    updateDebugText();
    resolveOutcome(predeterminedRewards);
    if (effects.innerText.toLowerCase().indexOf('medium challenge') === -1) {
      failures.push('Two-challenge result should mention medium challenge.');
    }
    if (effects.innerText.toLowerCase().indexOf('a boring weapon') === -1) {
      failures.push('Challenge plus one weapon should mention boring weapon tier.');
    }

    clearCelebration();
    predeterminedRewards = ['challenge', 'challenge', 'challenge'];
    if (!isValidRewardSet(predeterminedRewards)) { failures.push('Triple challenge should be valid.'); }
    updateDebugText();
    resolveOutcome(predeterminedRewards);
    if (effects.innerText.toLowerCase().indexOf('challenge activated') === -1) {
      failures.push('Triple challenge should activate challenge text.');
    }

    if (!isValidRewardSet(['skull', 'challenge', 'skull'])) {
      failures.push('Challenge + skull should be valid in any reel order.');
    }
    if (isValidRewardSet(['challenge', 'skull', 'coin'])) {
      failures.push('Challenge should only combine with one other reward type.');
    }

    clearCelebration();
    predeterminedRewards = ['jackpot', 'jackpot', 'coin'];
    updateDebugText();
    resolveOutcome(predeterminedRewards);
    if (effects.innerText.toLowerCase().indexOf('powered-up reward') === -1) {
      failures.push('Double jackpot should show powered-up reward text.');
    }

    resetBars();
    clearCelebration();
    closeChest();
    generateRewards();
    if (!isValidRewardSet(predeterminedRewards)) {
      failures.push('Generated rewards should always be valid.');
    }
    before = predeterminedRewards.join(',');
    generateRewards();
    after = predeterminedRewards.join(',');
    if (!before || !after) {
      failures.push('Rewards should regenerate on demand.');
    }
    for (j = 0; j < 100; j += 1) {
      generateRewards();
      if (!isValidRewardSet(predeterminedRewards)) {
        failures.push('Random generation produced an invalid reward set.');
        break;
      }
    }

    resetBars();
    debugValue = debugText.innerText || '';
    if (!/^reel_1: /m.test(debugValue)) { failures.push('Debug text missing reel_1 line.'); }
    if (!/^reel_2: /m.test(debugValue)) { failures.push('Debug text missing reel_2 line.'); }
    if (!/^reel_3: /m.test(debugValue)) { failures.push('Debug text missing reel_3 line.'); }
    if (debugValue.indexOf('Presentation') !== -1 || debugValue.indexOf('presentation') !== -1) {
      failures.push('Debug text should only show reel lines.');
    }
    if (debugValue.split(NEWLINE).length !== 3) {
      failures.push('Debug text should contain exactly 3 lines.');
    }
    if (bars.some(function (bar) { return bar.dataset.key !== 'empty'; })) {
      failures.push('Bars should reset to empty state.');
    }
    if (enemyBurst.classList.contains('showBurst') || fireworks.classList.contains('showFireworks')) {
      failures.push('Celebration state should clear on reset.');
    }

    generateRewards();
    if (failures.length > 0) {
      debugText.innerText += NEWLINE + 'SELF-TESTS: FAILED' + NEWLINE + failures.join(NEWLINE);
      console.warn('Self-tests failed', failures);
    } else {
      console.info('Self-tests passed');
    }
  }

  openBtn.onclick = startSpin;
  setReelsBtn.onclick = function () {
    var selected = reelSelects.map(function (sel) { return sel.value; });
    if (!isValidRewardSet(selected)) {
      setPresetStatus('Invalid combo for challenge rules.', true);
      return;
    }
    predeterminedRewards = selected.slice();
    manualPresetActive = true;
    updateDebugText();
    setPresetStatus('Custom reel set armed.', false);
  };
  restartBtn.onclick = function () {
    resetBars();
    clearCelebration();
    closeChest();
    manualPresetActive = false;
    generateRewards();
    setPresetStatus('Randomized next roll. Use Set to re-apply your selected reels.', false);
    restartBtn.style.display = 'none';
    openBtn.style.display = 'inline-block';
    startIdleLoop();
  };

  buildAudience();
  resetBars();
  generateRewards();
  buildReelPresetOptions();
  runSelfTests();
  startIdleLoop();
}());
</script>
</body>
</html>
